<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3DMT Inspector</title>
    <script
      type="module"
      src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"
    ></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Toolbar -->
    <header id="toolbar">
      <input
        id="url-input"
        type="text"
        placeholder="Paste a public GLB URL..."
        autocomplete="off"
        spellcheck="false"
      />

      <details id="config-panel">
        <summary>Options</summary>
        <div id="config-grid">
          <label for="cfg-format">Format</label>
          <select id="cfg-format">
            <option value="">(default)</option>
            <option value="webp">webp</option>
            <option value="jpeg">jpeg</option>
            <option value="png">png</option>
            <option value="avif">avif</option>
          </select>

          <label for="cfg-resolution">Resolution</label>
          <select id="cfg-resolution">
            <option value="">(default 1024)</option>
            <option value="256">256</option>
            <option value="512">512</option>
            <option value="1024">1024</option>
            <option value="2048">2048</option>
          </select>

          <label for="cfg-simplify">Simplify</label>
          <div id="simplify-row">
            <input id="cfg-simplify" type="checkbox" />
            <span id="ratio-wrap">
              <label for="cfg-ratio">Ratio</label>
              <input
                id="cfg-ratio"
                type="range"
                min="0.1"
                max="1"
                step="0.05"
                value="0.5"
              />
              <span id="ratio-value">0.5</span>
            </span>
          </div>

          <label for="cfg-keepmaterials">Keep materials</label>
          <input id="cfg-keepmaterials" type="checkbox" />

          <label for="cfg-keepmeshes">Keep meshes</label>
          <input id="cfg-keepmeshes" type="checkbox" />
        </div>
      </details>

      <button id="transform-btn">Transform</button>
    </header>

    <!-- Side-by-side viewers -->
    <main id="viewers">
      <div class="viewer-wrap">
        <div class="viewer-label">
          <span class="viewer-title">Original</span>
          <span id="size-before" class="size-tag"></span>
        </div>
        <model-viewer
          id="viewer-before"
          camera-controls
          auto-rotate
          shadow-intensity="1"
        ></model-viewer>
      </div>

      <div class="viewer-wrap">
        <div class="viewer-label">
          <span class="viewer-title">Transformed</span>
          <span id="size-after" class="size-tag"></span>
        </div>
        <div id="viewer-after-wrap">
          <model-viewer
            id="viewer-after"
            camera-controls
            auto-rotate
            shadow-intensity="1"
          ></model-viewer>
          <div id="spinner-overlay" class="hidden">
            <div class="spinner"></div>
            <span>Transforming...</span>
          </div>
        </div>
      </div>
    </main>

    <!-- Modal -->
    <div id="modal" class="hidden" role="dialog" aria-modal="true">
      <div id="modal-box">
        <h3 id="modal-title">Error</h3>
        <p id="modal-msg"></p>
        <button id="modal-close">Close</button>
      </div>
    </div>

    <script src="app.js" type="module"></script>
  </body>
</html>
